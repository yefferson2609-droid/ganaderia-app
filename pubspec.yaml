name: ganaderia
description: App de gestión ganadera para finca.
publish_to: 'none'
version: 1.0.5+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # Base de datos local (offline)
  sqflite: ^2.4.2
  path: ^1.9.0

  # Estado
  provider: ^6.1.2

  # Navegación
  go_router: ^14.8.1

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # Conectividad
  connectivity_plus: ^6.1.4

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
